<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie-App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<!-- <p><i class="fa-solid fa-book"></i> Library</p> -->
<body>
    <div class="main_div">
        <!-- NAVBAR -->
        <nav class="navbar">
            <ul class="nav_list">
                <li class="nav_links">Home</li>
                <li class="nav_links">Genre</li>
                <li class="nav_links">Country</li>
                <li class="nav_links">Movies</li>
                <li class="nav_links">TV Shows</li>
            </ul>
        </nav>

        <!-- MOVIES SECTION -->
        <div class="movies_section">
            <img id="image" src="" alt="" />
            <h3 id="movie_name"></h3>
            <p id="duration"></p>
            <p id="likes"></p>
        </div>

        <!-- FOOTER SECTION -->
        <footer class="footer">
            <!-- <div class="socials"> -->
                 <p class="whatsapp_icon"><i class="fa-brands fa-whatsapp"></i></p>
                 <p class="twitter_icon"><i class="fa-brands fa-x-twitter"></i></i></p>
                 <p class="instagram_icon"><i class="fa-brands fa-instagram"></i></p>
            <!-- </div> -->
        </footer>
    </div>
</body>
</html>
